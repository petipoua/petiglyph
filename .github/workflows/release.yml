name: release-artifacts

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to package (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  package-hygiene:
    name: package-hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Assert release package hygiene
        run: ./scripts/release_assert_clean_tree.sh

  build:
    name: build-${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: package-hygiene
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            bin_ext: ""
            smoke: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
            bin_ext: ""
            smoke: false
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            archive: tar.gz
            bin_ext: ""
            smoke: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            archive: tar.gz
            bin_ext: ""
            smoke: false
          - os: macos-15-intel
            target: x86_64-apple-darwin
            archive: tar.gz
            bin_ext: ""
            smoke: true
          - os: macos-15
            target: aarch64-apple-darwin
            archive: tar.gz
            bin_ext: ""
            smoke: true
          - os: windows-2025
            target: x86_64-pc-windows-msvc
            archive: zip
            bin_ext: ".exe"
            smoke: true
          - os: windows-2025
            target: aarch64-pc-windows-msvc
            archive: zip
            bin_ext: ".exe"
            smoke: false

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Install FFmpeg for runtime smoke checks
        if: matrix.smoke
        shell: bash
        run: |
          set -euo pipefail
          case "$RUNNER_OS" in
            Linux)
              sudo apt-get update
              sudo apt-get install -y ffmpeg
              ;;
            macOS)
              brew install ffmpeg
              ;;
            Windows)
              choco install ffmpeg --yes --no-progress
              ;;
            *)
              echo "unsupported runner OS: $RUNNER_OS" >&2
              exit 1
              ;;
          esac
          ffmpeg -version

      - name: Build
        uses: houseabsolute/actions-rust-cross@f481cb5e0110765615313e2177ce12a99bf26bbd
        with:
          command: build
          target: ${{ matrix.target }}
          toolchain: "1.88.0"
          args: "--release --locked"
          strip: true

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          base="petiglyph-${{ env.RELEASE_TAG }}-${{ matrix.target }}"
          pkgdir="$base"
          mkdir -p "$pkgdir"
          cp "target/${{ matrix.target }}/release/petiglyph${{ matrix.bin_ext }}" "$pkgdir/"
          cp README.md LICENSE "$pkgdir/"
          tar -czf "$base.tar.gz" "$pkgdir"

      - name: Package (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $base = "petiglyph-${{ env.RELEASE_TAG }}-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path $base | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/petiglyph${{ matrix.bin_ext }}" "$base/"
          Copy-Item README.md "$base/"
          Copy-Item LICENSE "$base/"
          Compress-Archive -Path $base -DestinationPath "$base.zip" -Force

      - name: Archive smoke check (unix)
        if: matrix.archive == 'tar.gz' && matrix.smoke
        shell: bash
        run: |
          set -euo pipefail
          base="petiglyph-${{ env.RELEASE_TAG }}-${{ matrix.target }}"
          workdir="$(mktemp -d)"
          tar -xzf "$base.tar.gz" -C "$workdir"
          bin="$workdir/$base/petiglyph"
          "$bin" --help >/dev/null
          smoke_home="$(mktemp -d)"
          smoke_work="$(mktemp -d)"
          doctor_json="$(cd "$smoke_work" && HOME="$smoke_home" "$bin" doctor --json)"
          echo "$doctor_json" | grep -Eq '"ok"[[:space:]]*:[[:space:]]*true'
          if HOME="$smoke_home" "$bin" tui </dev/null >/tmp/petiglyph-tui-smoke.log 2>&1; then
            echo "Expected non-interactive tui invocation to fail" >&2
            exit 1
          fi
          grep -Eiq "terminal|tty" /tmp/petiglyph-tui-smoke.log

      - name: Archive smoke check (windows)
        if: matrix.archive == 'zip' && matrix.smoke
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $base = "petiglyph-${{ env.RELEASE_TAG }}-${{ matrix.target }}"
          $workdir = Join-Path $env:RUNNER_TEMP "petiglyph-smoke-${{ matrix.target }}"
          if (Test-Path $workdir) { Remove-Item -Recurse -Force $workdir }
          New-Item -ItemType Directory -Force -Path $workdir | Out-Null
          Expand-Archive -Path "$base.zip" -DestinationPath $workdir -Force
          $bin = Join-Path (Join-Path $workdir $base) "petiglyph.exe"
          & $bin --help | Out-Null
          $smokeHome = Join-Path $env:RUNNER_TEMP "petiglyph-home-${{ matrix.target }}"
          $smokeLocalAppData = Join-Path $smokeHome "LocalAppData"
          $smokeWork = Join-Path $env:RUNNER_TEMP "petiglyph-work-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path $smokeHome, $smokeLocalAppData, $smokeWork | Out-Null
          $env:HOME = $smokeHome
          $env:USERPROFILE = $smokeHome
          $env:LOCALAPPDATA = $smokeLocalAppData
          Push-Location $smokeWork
          try {
            $doctor = & $bin doctor --json
          } finally {
            Pop-Location
          }
          if ($doctor -notmatch '"ok"\s*:\s*true') { throw "doctor --json did not report ok=true" }
          $tuiOutput = $null | & $bin tui 2>&1
          if ($LASTEXITCODE -eq 0) { throw "Expected non-interactive tui invocation to fail" }
          if (($tuiOutput | Out-String) -notmatch '(?i)terminal|tty') {
            throw "Expected terminal-required/TTY error text for tui </dev/null equivalent"
          }
          exit 0

      - name: Upload archive
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: release-${{ matrix.target }}
          path: |
            petiglyph-${{ env.RELEASE_TAG }}-${{ matrix.target }}.tar.gz
            petiglyph-${{ env.RELEASE_TAG }}-${{ matrix.target }}.zip
          if-no-files-found: error

  publish:
    name: publish-release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Verify tag-trigger context
        shell: bash
        run: |
          set -euo pipefail
          [[ "${RELEASE_TAG}" =~ ^v[0-9] ]] || { echo "Tag must start with v<version>" >&2; exit 1; }

      - name: Download archives
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          pattern: release-*
          merge-multiple: true
          path: dist

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum petiglyph-* > SHA256SUMS

      - name: Attest build artifacts
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26
        with:
          subject-path: dist/*

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          draft: true
          generate_release_notes: false
          body_path: RELEASE_NOTES_TEMPLATE.md
          files: dist/*
