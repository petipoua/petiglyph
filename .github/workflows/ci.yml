name: ci

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions: {}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-quality:
    name: rust-quality-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Show toolchain
        shell: bash
        run: |
          set -euo pipefail
          rustc --version
          cargo --version

      - name: Cargo fmt check
        run: cargo fmt --check

      - name: Cargo check
        run: cargo check --locked

      - name: Cargo clippy
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Cargo test
        run: cargo test --locked

  package-hygiene:
    name: package-hygiene-linux
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Cargo package listing
        shell: bash
        run: |
          set -euo pipefail
          cargo package --list --allow-dirty

      - name: Assert release package hygiene
        run: ./scripts/release_assert_clean_tree.sh

  tui-e2e-hty:
    name: tui-e2e-hty-linux
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install hty
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://raw.githubusercontent.com/LatentEvals/hty/main/scripts/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Show hty version
        shell: bash
        run: |
          set -euo pipefail
          hty --help

      - name: Run core TUI E2E journeys
        run: ./scripts/tui_e2e_hty.sh --journey 1,2,3,4,5,6,7

      - name: Run creation-workflow popup journeys
        run: ./scripts/tui_e2e_hty.sh --journey 8,9,10

  runtime-smoke:
    name: runtime-smoke-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Runtime smoke (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          export HOME="$(mktemp -d)"
          export XDG_CONFIG_HOME="$HOME/.config"
          export XDG_DATA_HOME="$HOME/.local/share"
          mkdir -p "$XDG_CONFIG_HOME" "$XDG_DATA_HOME"
          ./scripts/clipboard_smoke.sh --skip-clipboard-checks

      - name: Runtime smoke (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $root = Join-Path $env:RUNNER_TEMP ("petiglyph-runtime-" + [Guid]::NewGuid().ToString("N"))
          $home = Join-Path $root "home"
          $local = Join-Path $root "localappdata"
          $temp = Join-Path $root "tmp"
          New-Item -ItemType Directory -Force -Path $home,$local,$temp | Out-Null
          $env:HOME = $home
          $env:USERPROFILE = $home
          $env:LOCALAPPDATA = $local
          $env:APPDATA = Join-Path $home "AppData\\Roaming"
          $env:TEMP = $temp
          $env:TMP = $temp
          New-Item -ItemType Directory -Force -Path $env:APPDATA | Out-Null
          pwsh -File .\scripts\clipboard_smoke.ps1 -SkipClipboardChecks

  supply-chain:
    name: supply-chain-linux
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install cargo-deny and cargo-audit
        shell: bash
        run: |
          set -euo pipefail
          cargo install --locked cargo-deny
          cargo install --locked cargo-audit

      - name: Cargo deny check
        run: cargo deny check

      - name: Cargo audit
        run: cargo audit

      - name: Cargo tree (normal dependencies)
        shell: bash
        run: |
          set -euo pipefail
          cargo tree --locked -e normal > cargo-tree-normal.txt
          cat cargo-tree-normal.txt

      - name: Upload dependency tree
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: cargo-tree-normal
          path: cargo-tree-normal.txt
          if-no-files-found: error
