name: release-artifacts

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  package-hygiene:
    name: package-hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Assert release package hygiene
        run: ./scripts/release_assert_clean_tree.sh

  build:
    name: build-${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: package-hygiene
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            bin_ext: ""
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
            bin_ext: ""
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            archive: tar.gz
            bin_ext: ""
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            archive: tar.gz
            bin_ext: ""
          - os: macos-15-intel
            target: x86_64-apple-darwin
            archive: tar.gz
            bin_ext: ""
          - os: macos-15
            target: aarch64-apple-darwin
            archive: tar.gz
            bin_ext: ""
          - os: windows-2025
            target: x86_64-pc-windows-msvc
            archive: zip
            bin_ext: ".exe"
          - os: windows-2025
            target: aarch64-pc-windows-msvc
            archive: zip
            bin_ext: ".exe"

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Build
        uses: houseabsolute/actions-rust-cross@f481cb5e0110765615313e2177ce12a99bf26bbd
        with:
          command: build
          target: ${{ matrix.target }}
          args: "--release --locked"
          strip: true

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          base="petiglyph-${{ github.ref_name }}-${{ matrix.target }}"
          pkgdir="$base"
          mkdir -p "$pkgdir"
          cp "target/${{ matrix.target }}/release/petiglyph${{ matrix.bin_ext }}" "$pkgdir/"
          cp README.md LICENSE "$pkgdir/"
          tar -czf "$base.tar.gz" "$pkgdir"

      - name: Package (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $base = "petiglyph-${{ github.ref_name }}-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path $base | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/petiglyph${{ matrix.bin_ext }}" "$base/"
          Copy-Item README.md "$base/"
          Copy-Item LICENSE "$base/"
          Compress-Archive -Path "$base/*" -DestinationPath "$base.zip" -Force

      - name: Upload archive
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: release-${{ matrix.target }}
          path: |
            petiglyph-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
            petiglyph-${{ github.ref_name }}-${{ matrix.target }}.zip
          if-no-files-found: error

  publish:
    name: publish-release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Verify tag-trigger context
        shell: bash
        run: |
          set -euo pipefail
          [[ "${GITHUB_REF_TYPE}" == "tag" ]] || { echo "Ref type must be tag" >&2; exit 1; }
          [[ "${GITHUB_REF_NAME}" =~ ^v[0-9] ]] || { echo "Tag must start with v<version>" >&2; exit 1; }

      - name: Download archives
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          pattern: release-*
          merge-multiple: true
          path: dist

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum petiglyph-* > SHA256SUMS

      - name: Attest build artifacts
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26
        with:
          subject-path: dist/*

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          generate_release_notes: true
          files: dist/*
