name: publish-pypi

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to publish (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RELEASE_TAG: ${{ github.event.release.tag_name || github.event.inputs.tag }}

jobs:
  build-wheels:
    name: wheel-${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: "2014"
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            manylinux: "2014"
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: macos-15
            target: aarch64-apple-darwin
          - os: windows-2025
            target: x86_64-pc-windows-msvc
          - os: windows-2025
            target: aarch64-pc-windows-msvc

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Verify tag matches Cargo.toml
        shell: bash
        run: |
          set -euo pipefail
          version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n1)"
          if [[ "v$version" != "${{ env.RELEASE_TAG }}" ]]; then
            echo "Tag/version mismatch: tag=${{ env.RELEASE_TAG }}, Cargo.toml=$version" >&2
            exit 1
          fi

      - name: Build wheel (linux manylinux container)
        if: runner.os == 'Linux'
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b
        with:
          command: build
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          args: --release --locked --out dist

      - name: Build wheel (non-linux)
        if: runner.os != 'Linux'
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b
        with:
          command: build
          target: ${{ matrix.target }}
          args: --release --locked --out dist

      - name: Upload wheels
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: wheels-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  build-sdist:
    name: sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Assert clean release checkout
        run: ./scripts/release_assert_clean_tree.sh

      - name: Build sdist
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b
        with:
          command: sdist
          args: --out dist

      - name: Upload sdist
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: sdist
          path: dist/*
          if-no-files-found: error

  publish-testpypi:
    name: publish-testpypi
    runs-on: ubuntu-latest
    needs: [build-wheels, build-sdist]
    environment: testpypi
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - name: Download sdist artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: sdist
          path: dist

      - name: Validate distributions with twine check
        run: |
          python -m pip install --upgrade pip twine packaging
          python -m twine check dist/*

      - name: Publish distributions to TestPyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: publish-pypi
    runs-on: ubuntu-latest
    needs: publish-testpypi
    environment: pypi
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - name: Download sdist artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: sdist
          path: dist

      - name: Validate distributions with twine check
        run: |
          python -m pip install --upgrade pip twine
          python -m twine check dist/*

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
