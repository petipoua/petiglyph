name: release-artifacts

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build-${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            bin_ext: ""
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
            bin_ext: ""
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            archive: tar.gz
            bin_ext: ""
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            archive: tar.gz
            bin_ext: ""
          - os: macos-13
            target: x86_64-apple-darwin
            archive: tar.gz
            bin_ext: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
            bin_ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            bin_ext: ".exe"
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            archive: zip
            bin_ext: ".exe"

    steps:
      - uses: actions/checkout@v4

      - name: Build
        uses: houseabsolute/actions-rust-cross@v1
        with:
          command: build
          target: ${{ matrix.target }}
          args: "--release --locked"
          strip: true

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          base="petiglyph-${{ github.ref_name }}-${{ matrix.target }}"
          pkgdir="$base"
          mkdir -p "$pkgdir"
          cp "target/${{ matrix.target }}/release/petiglyph${{ matrix.bin_ext }}" "$pkgdir/"
          cp README.md LICENSE "$pkgdir/"
          tar -czf "$base.tar.gz" "$pkgdir"

      - name: Package (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $base = "petiglyph-${{ github.ref_name }}-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path $base | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/petiglyph${{ matrix.bin_ext }}" "$base/"
          Copy-Item README.md "$base/"
          Copy-Item LICENSE "$base/"
          Compress-Archive -Path "$base/*" -DestinationPath "$base.zip" -Force

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            petiglyph-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
            petiglyph-${{ github.ref_name }}-${{ matrix.target }}.zip
          if-no-files-found: error

  publish:
    name: publish-release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Download archives
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: dist

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum petiglyph-* > SHA256SUMS

      - name: Attest build artifacts
        uses: actions/attest@v4
        with:
          subject-path: dist/*

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
