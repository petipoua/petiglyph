name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            bin_ext: ""
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
            bin_ext: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
            bin_ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            bin_ext: ".exe"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        run: |
          set -eux
          BIN="target/${{ matrix.target }}/release/petiglyph${{ matrix.bin_ext }}"
          OUT="petiglyph-${{ github.ref_name }}-${{ matrix.target }}.tar.gz"
          tar -czf "$OUT" -C "$(dirname "$BIN")" "$(basename "$BIN")"

      - name: Package (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $bin = "target/${{ matrix.target }}/release/petiglyph${{ matrix.bin_ext }}"
          $out = "petiglyph-${{ github.ref_name }}-${{ matrix.target }}.zip"
          Compress-Archive -Path $bin -DestinationPath $out -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: petiglyph-${{ matrix.target }}
          path: |
            petiglyph-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
            petiglyph-${{ github.ref_name }}-${{ matrix.target }}.zip
          if-no-files-found: ignore

  publish:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist-release

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist-release/**/*
