name: ci

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions: {}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_DENY_VERSION: "0.19.8"
  CARGO_AUDIT_VERSION: "0.22.1"
  CARGO_BINSTALL_VERSION: "1.12.7"
  HTY_INSTALLER_COMMIT: "23a4ac84ed996470f6ceaa1aa9cc7c94e03a1bbb"
  HTY_INSTALLER_SHA256: "49cba3cda1d7ad1db67add0f33d169c045aca3d507c0f48b3e1d55634f550ad5"
  HTY_VERSION: "v0.7.0"

jobs:
  rust-quality:
    name: rust-quality-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    env:
      PETIGLYPH_MOCK_CLIPBOARD: "1"
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Cache rust-quality cargo + target
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-rust-quality-${{ github.workflow }}-${{ hashFiles('Cargo.lock') }}-${{ hashFiles('rust-toolchain.toml', 'rust-toolchain') }}

      - name: Show toolchain
        shell: bash
        run: |
          set -euo pipefail
          rustc --version
          cargo --version

      - name: Cargo fmt check
        run: cargo fmt --check

      - name: Cargo clippy
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Cargo test
        run: cargo test --locked

  package-hygiene:
    name: package-hygiene-linux
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Cargo package listing
        shell: bash
        run: |
          set -euo pipefail
          cargo package --list --allow-dirty

      - name: Assert release package hygiene
        run: ./scripts/release_assert_clean_tree.sh

      - name: Check distribution matrix sync
        run: ./scripts/distribution_matrix.py --check-sync

  tui-e2e-hty:
    name: tui-e2e-hty-linux
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      PETIGLYPH_MOCK_CLIPBOARD: "1"

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install hty
        shell: bash
        run: |
          set -euo pipefail
          installer_url="https://raw.githubusercontent.com/LatentEvals/hty/${HTY_INSTALLER_COMMIT}/scripts/install.sh"
          installer_path="$(mktemp)"
          curl -fsSL "$installer_url" -o "$installer_path"
          echo "${HTY_INSTALLER_SHA256}  ${installer_path}" | sha256sum -c -
          sh "$installer_path" --version "${HTY_VERSION}" --verify always
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Show hty version
        shell: bash
        run: |
          set -euo pipefail
          hty --help

      - name: Run core TUI E2E journeys
        run: ./scripts/tui_e2e_hty.sh --journey 1,2,3,4,5,6,7

      - name: Run creation-workflow popup journeys
        run: ./scripts/tui_e2e_hty.sh --journey 8,9,10

  runtime-smoke:
    name: runtime-smoke-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Runtime smoke (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          export HOME="$(mktemp -d)"
          export XDG_CONFIG_HOME="$HOME/.config"
          export XDG_DATA_HOME="$HOME/.local/share"
          mkdir -p "$XDG_CONFIG_HOME" "$XDG_DATA_HOME"
          ./scripts/clipboard_smoke.sh --skip-clipboard-checks

      - name: Runtime smoke (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $root = Join-Path $env:RUNNER_TEMP ("petiglyph-runtime-" + [Guid]::NewGuid().ToString("N"))
          $homeDir = Join-Path $root "home"
          $local = Join-Path $root "localappdata"
          $temp = Join-Path $root "tmp"
          New-Item -ItemType Directory -Force -Path $homeDir,$local,$temp | Out-Null
          $env:HOME = $homeDir
          $env:USERPROFILE = $homeDir
          $env:LOCALAPPDATA = $local
          $env:APPDATA = Join-Path $homeDir "AppData\\Roaming"
          $env:TEMP = $temp
          $env:TMP = $temp
          New-Item -ItemType Directory -Force -Path $env:APPDATA | Out-Null
          pwsh -File .\scripts\clipboard_smoke.ps1 -SkipClipboardChecks

  supply-chain:
    name: supply-chain-linux
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Cache cargo tooling
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-cargo-tools-v1-${{ env.CARGO_BINSTALL_VERSION }}-${{ env.CARGO_DENY_VERSION }}-${{ env.CARGO_AUDIT_VERSION }}

      - name: Install cargo-binstall
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v cargo-binstall >/dev/null 2>&1; then
            cargo install --locked cargo-binstall --version "${CARGO_BINSTALL_VERSION}"
          fi

      - name: Install cargo-deny and cargo-audit (binstall)
        shell: bash
        run: |
          set -euo pipefail
          cargo binstall --no-confirm --locked \
            "cargo-deny@${CARGO_DENY_VERSION}" \
            "cargo-audit@${CARGO_AUDIT_VERSION}"

      - name: Cargo deny check
        run: cargo deny check

      - name: Cargo audit
        run: cargo audit

      - name: Cargo tree (normal dependencies)
        shell: bash
        run: |
          set -euo pipefail
          cargo tree --locked -e normal > cargo-tree-normal.txt
          cat cargo-tree-normal.txt

      - name: Upload dependency tree
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: cargo-tree-normal
          path: cargo-tree-normal.txt
          if-no-files-found: error
