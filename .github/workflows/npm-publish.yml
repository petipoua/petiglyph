name: publish-npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to publish (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: read

env:
  NODE_VERSION: "24"
  RELEASE_TAG: ${{ github.event.release.tag_name || github.event.inputs.tag }}

jobs:
  publish:
    name: npm-publish
    runs-on: ubuntu-latest
    environment: npm
    env:
      NPM_PUBLISH_TOKEN: ${{ secrets.NPM_PUBLISH_TOKEN }}
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.event.release.tag_name || github.ref_name }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org

      - name: Assert clean release checkout
        run: ./scripts/release_assert_clean_tree.sh

      - name: Verify release metadata and integrity
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ env.RELEASE_TAG }}
        run: |
          set -euo pipefail
          mkdir -p dist-release
          gh release download -R "$GITHUB_REPOSITORY" "$TAG" \
            --pattern "petiglyph-v*-*.tar.gz" \
            --pattern "petiglyph-v*-*.zip" \
            --pattern "SHA256SUMS" \
            --dir dist-release
          for archive in dist-release/petiglyph-v*-*.tar.gz dist-release/petiglyph-v*-*.zip; do
            [[ -f "$archive" ]] || continue
            gh attestation verify "$archive" \
              -R "$GITHUB_REPOSITORY" \
              --signer-workflow "$GITHUB_REPOSITORY/.github/workflows/release.yml"
          done
          (cd dist-release && sha256sum -c SHA256SUMS)

      - name: Verify tag and sync versions
        run: |
          set -euo pipefail
          version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n1)"
          if [[ "v$version" != "${{ env.RELEASE_TAG }}" ]]; then
            echo "Tag/version mismatch: tag=${{ env.RELEASE_TAG }}, Cargo.toml=$version" >&2
            exit 1
          fi
          ./scripts/release_sync_versions.sh

      - name: Stage platform binaries into npm packages
        run: ./scripts/release_stage_npm_artifacts.sh dist-release

      - name: Verify staged binaries exist
        run: |
          set -euo pipefail
          while IFS= read -r bin_path; do
            [[ -n "$bin_path" ]] || continue
            [[ -f "$bin_path" ]] || { echo "Missing staged binary: $bin_path" >&2; exit 1; }
          done < <(./scripts/distribution_matrix.py --npm-bin-paths)

      - name: npm pack dry-run validation
        run: |
          set -euo pipefail
          for pkg in npm/*; do
            if [[ -f "$pkg/package.json" ]]; then
              (cd "$pkg" && npm pack --dry-run >/dev/null)
            fi
          done

      - name: Publish platform packages
        if: ${{ env.NPM_PUBLISH_TOKEN != '' }}
        env:
          NODE_AUTH_TOKEN: ${{ env.NPM_PUBLISH_TOKEN }}
        run: |
          set -euo pipefail
          while IFS= read -r pkg; do
            [[ -n "$pkg" ]] || continue
            (cd "$pkg" && npm publish --access public)
          done < <(./scripts/distribution_matrix.py --npm-package-dirs)

      - name: Publish meta package
        if: ${{ env.NPM_PUBLISH_TOKEN != '' }}
        env:
          NODE_AUTH_TOKEN: ${{ env.NPM_PUBLISH_TOKEN }}
        run: |
          set -euo pipefail
          (cd npm/petiglyph && npm publish --access public)

      - name: Publish platform packages with trusted publishing
        if: ${{ env.NPM_PUBLISH_TOKEN == '' }}
        run: |
          set -euo pipefail
          while IFS= read -r pkg; do
            [[ -n "$pkg" ]] || continue
            (cd "$pkg" && npm publish --access public)
          done < <(./scripts/distribution_matrix.py --npm-package-dirs)

      - name: Publish meta package with trusted publishing
        if: ${{ env.NPM_PUBLISH_TOKEN == '' }}
        run: |
          set -euo pipefail
          (cd npm/petiglyph && npm publish --access public)
